<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ASCIIQUEST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <input id="mobile-text-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false"
           style="position:absolute;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px;">
    <div id="touch-controls" class="hidden">
      <div class="touch-bar">
        <!-- Context-sensitive action buttons on left -->
        <div class="action-buttons" id="touch-action-area"></div>
        <!-- D-pad on right (right-hand thumb) -->
        <div class="dpad">
          <button class="dpad-btn up" data-dir="up">&#9650;</button>
          <button class="dpad-btn left" data-dir="left">&#9664;</button>
          <button class="dpad-btn center" data-dir="wait">&#9679;</button>
          <button class="dpad-btn right" data-dir="right">&#9654;</button>
          <button class="dpad-btn down" data-dir="down">&#9660;</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
