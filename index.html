<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ASCIIQUEST - Retro Roguelike</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="touch-controls" class="hidden">
      <div class="dpad">
        <button class="dpad-btn up" data-dir="up">&#9650;</button>
        <button class="dpad-btn left" data-dir="left">&#9664;</button>
        <button class="dpad-btn center" data-dir="wait">&#9679;</button>
        <button class="dpad-btn right" data-dir="right">&#9654;</button>
        <button class="dpad-btn down" data-dir="down">&#9660;</button>
      </div>
      <div class="action-buttons">
        <button class="action-btn" data-action="interact">ACT</button>
        <button class="action-btn" data-action="inventory">INV</button>
        <button class="action-btn" data-action="map">MAP</button>
        <button class="action-btn" data-action="menu">MNU</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
