<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ASCIIQUEST [alpha 0.0.155]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <input id="mobile-text-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false"
           style="position:absolute;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px;">
    <div id="touch-controls" class="hidden">
      <div class="touch-utility">
        <button class="gpad-btn util util-dbg" data-util="debug">DBG</button>
        <button class="gpad-btn util util-opc" data-util="opacity">OPC</button>
        <button class="gpad-btn util util-eye" data-util="hide">HID</button>
      </div>
      <div class="touch-grid">
        <!-- Shoulder buttons with Select/Start between -->
        <button class="gpad-btn shoulder" data-btn="L1">L1</button>
        <button class="gpad-btn meta" data-btn="SELECT">SEL</button>
        <button class="gpad-btn shoulder" data-btn="R1">R1</button>
        <button class="gpad-btn shoulder" data-btn="L2">L2</button>
        <button class="gpad-btn meta start" data-btn="START">STR</button>
        <button class="gpad-btn shoulder" data-btn="R2">R2</button>
        <!-- D-pad (3×3 with diagonals) -->
        <button class="gpad-btn dpad diag" data-btn="UL">↖</button>
        <button class="gpad-btn dpad" data-btn="UP">▲</button>
        <button class="gpad-btn dpad diag" data-btn="UR">↗</button>
        <button class="gpad-btn dpad" data-btn="LEFT">◄</button>
        <button class="gpad-btn dpad center" data-btn="INTERACT">ACT</button>
        <button class="gpad-btn dpad" data-btn="RIGHT">►</button>
        <button class="gpad-btn dpad diag" data-btn="DL">↙</button>
        <button class="gpad-btn dpad" data-btn="DOWN">▼</button>
        <button class="gpad-btn dpad diag" data-btn="DR">↘</button>
        <!-- Face buttons: ABXY -->
        <button class="gpad-btn empty"></button>
        <button class="gpad-btn face face-y" data-btn="Y">Y</button>
        <button class="gpad-btn empty"></button>
        <button class="gpad-btn face face-x" data-btn="X">X</button>
        <button class="gpad-btn face face-a" data-btn="A">A</button>
        <button class="gpad-btn face face-b" data-btn="B">B</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
